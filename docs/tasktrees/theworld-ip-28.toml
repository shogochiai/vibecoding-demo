```toml
version = "1.0"
id = "theworld-ip-28"
title = "Emergency Pause — DAO全操作の一時停止機能"
owner = "etherclaw"
created_at = "2026-04-01"
family = "evm"

# SPEC:
# REQ_PAUSE_001: Guardian（マルチシグ or DAO）がpause()を呼び出し、全操作を一時停止できる
# REQ_PAUSE_002: pause中は状態変更を伴う全selector呼び出しがrevertする
# REQ_PAUSE_003: unpause()でDAO投票により再開できる
# REQ_PAUSE_004: pause状態はProxy storageで管理し、Implementation側は状態を持たない
# REQ_PAUSE_005: pause/unpauseイベントをemitし、オフチェーン監視が検知可能

[root]
id = "ip28-root"
name = "Emergency Pause機能の実装・デプロイ・検証"
estimate = { hours = 18 }
checkbox = "unchecked"

[[root.subtasks]]
id = "ip28-1"
name = "REQ_PAUSE_001 — PauseGuard Idris2モジュール実装 (Yul codegen)"
estimate = { hours = 4 }
checkbox = "unchecked"
acceptance = [
  "idris2-yul --codegen yul src/Pause.idr が成功し Yul出力が生成される",
  "生成Yulに pause() / unpause() / paused() の3関数セレクタが含まれる: grep -c 'case 0x' build/Pause.yul",
  "solc --strict-assembly build/Pause.yul が正常にバイトコードを出力する",
]

[[root.subtasks]]
id = "ip28-2"
name = "REQ_PAUSE_002 — ERC-7546 Proxy pause gatekeeperフック実装"
estimate = { hours = 4 }
checkbox = "unchecked"
acceptance = [
  "Proxy の getImplementation(bytes4) が paused==true 時に非view selectorへ revert を返すことをYulレベルで確認: grep 'revert' build/ProxyPause.yul",
  "paused==false 時は通常の delegatecall ルーティングが維持される",
  "pause状態がProxy storage slot (keccak256('td.pause.active')) に格納される: grep 'td.pause.active' src/ProxyPause.idr",
]

[[root.subtasks]]
id = "ip28-3"
name = "REQ_PAUSE_003 — unpause DAO投票ガード実装"
