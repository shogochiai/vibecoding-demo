  { description = "PauseActivated(auditors[], timestamp) イベントが定義される", verify = "grep 'PauseActivated' src/Pause/Events.idr" },
  { description = "PauseDeactivated(proposalId, timestamp) イベントが定義される", verify = "grep 'PauseDeactivated' src/Pause/Events.idr" },
]

[[root.subtasks]]
id = "ip23-5"
