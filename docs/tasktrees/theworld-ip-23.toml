  { description = "Shareholder 過半数の投票で unpause される Yul コードが生成される", verify = "idris2-yul --codegen yul src/Pause/Unpause.idr && test -f build/Unpause.yul" },
  { description = "過半数未満では unpause が revert する", verify = "cd test && idris2 --exec testInsufficientVotes PauseUnpauseTest.idr" },
  { description = "解除後に操作が正常実行される", verify = "cd test && idris2 --exec testResumeAfterUnpause PauseUnpauseTest.idr" },
]

[[root.subtasks]]
id = "ip23-4"
name = "REQ_PAUSE_004 — イベントログ記録"
