  { description = "solc --strict-assembly でバイトコードが生成される", verify = "solc --strict-assembly build/Trigger.yul --bin && solc --strict-assembly build/Unpause.yul --bin" },
  { description = "t-ECDSA 署名による Base Mainnet デプロイスクリプトが存在する", verify = "test -f deploy/ip23-pause.sh && grep 'TheWorld' deploy/ip23-pause.sh" },
]

