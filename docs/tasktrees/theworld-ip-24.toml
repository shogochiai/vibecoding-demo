```toml
# SPEC:
# REQ_CANCEL_001 — cancelProposal selector: author can cancel own proposal before voting ends
# REQ_CANCEL_002 — State transition: proposal moves to Cancelled state, excluded from tally
# REQ_CANCEL_003 — Access control: only original author can cancel (msg.sender == proposer)
# REQ_CANCEL_004 — Slot freeing: cancelled proposal frees voting slot
# REQ_CANCEL_005 — Event emission: CancelProposal(uint256 proposalId) event emitted
# REQ_CANCEL_006 — Verification: deployed bytecode matches compiled artifact

version = "1.0"
id = "theworld-ip-24"
title = "Add cancelProposal to td governance"
owner = "etherclaw"
created_at = "2026-04-01"
family = "evm"

[[codebase_ref]]
path = "src/Governance/Proposal.idr"
comment = "Existing proposal state machine and submit logic — cancel must mirror state transitions"

[[codebase_ref]]
path = "src/Governance/Tally.idr"
comment = "Tally logic — cancelled proposals must be excluded"

[[codebase_ref]]
path = "src/Proxy/Selectors.idr"
comment = "ERC-7546 selector registry — new cancelProposal selector must be registered"

[root]
id = "ip-24-cancel-proposal"
name = "Add cancelProposal to td governance"
estimate = { hours = 18 }
checkbox = "unchecked"

[[root.subtasks]]
id = "ip-24-01-state-transition"
name = "REQ_CANCEL_002 — Add Cancelled state and transition logic in Idris2"
estimate = { hours = 4 }
checkbox = "unchecked"
acceptance = [
  { description = "Cancelled constructor exists in ProposalState sum type", verify = "grep -q 'Cancelled' src/Governance/Proposal.idr" },
  { description = "Transition from Active to Cancelled is defined, other transitions rejected", verify = "idris2 --check src/Governance/Proposal.idr" },
]

[[root.subtasks]]
id = "ip-24-02-cancel-function"
name = "REQ_CANCEL_001 REQ_CANCEL_003 — Implement cancelProposal with author-only access control"
estimate = { hours = 4 }
checkbox = "unchecked"
acceptance = [
  { description = "cancelProposal function compiles with msg.sender == proposer guard", verify = "idris2 --check src/Governance/Cancel.idr" },
  { description = "Yul codegen succeeds for cancelProposal", verify = "idris2-yul --codegen yul src/Governance/Cancel.idr -o build/Cancel.yul" },
  { description = "solc compiles the Yul output", verify = "solc --strict-assembly build/Cancel.yul --bin" },
]

[[root.subtasks]]
id = "ip-24-03-tally-exclusion"
name = "REQ_CANCEL_004 — Exclude cancelled proposals from tally and free voting slot"
estimate = { hours = 3 }
checkbox = "unchecked"
acceptance = [
  { description = "Tally logic skips proposals with Cancelled state", verify = "grep -q 'Cancelled' src/Governance/Tally.idr && idris2 --check src/Governance/Tally.idr" },
  { description = "Voting slot count decrements on cancel", verify = "idris2 --check src/Governance/Slots.idr" },
]

[[root.subtasks]]
id = "ip-24-04-event-selector"
name = "REQ_CANCEL_005 — Emit CancelProposal event and register ERC-7546 selector"
estimate = { hours = 3 }
checkbox = "unchecked"
acceptance = [
  { description = "CancelProposal event topic defined in Events module", verify = "grep -q 'CancelProposal' src/Governance/Events.idr" },
  { description = "cancelProposal selector registered via getImplementation(bytes4)", verify = "grep -q 'cancelProposal' src/Proxy/Selectors.idr" },
]

[[root.subtasks]]
id = "ip-24-05-deploy-verify"
name = "REQ_CANCEL_006 — Deploy via t-ECDSA and verify artifact parity"
estimate = { hours = 4 }
checkbox = "unchecked"
acceptance = [
  { description = "Implementation deployed to Base Mainnet via TheWorld t-ECDSA", verify = "etherclaw status --contract cancel-impl --network base" },
  { description = "Deployed bytecode matches compiled artifact", verify = "idris2 --exec verifyArtifact src/Verification/CancelVerify.idr" },
  { description = "Proxy selector 0xdc9cc645 routes to new implementation", verify = "cast call $PROXY_ADDR 'getImplementation(bytes4)' 0x$(cast sig 'cancelProposal(uint256)') --rpc-url $BASE_RPC" },
]
