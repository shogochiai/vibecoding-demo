# SPEC:
# REQ_DELEG_001: Shareholder can delegate voting power to another address
# REQ_DELEG_002: Delegatee accumulates delegator's voting power
# REQ_DELEG_003: Delegator can revoke delegation at any time
# REQ_DELEG_004: Delegation state queryable on-chain
# REQ_DELEG_005: ERC-7546 proxy integration for delegation facet

